{% extends 'base.html' %}
{% block title %}Register Matrimonial Profile{% endblock %}
{% block content %}
<div class="page-hero"><div class="container"><h1>Matrimonial Profile Register Karein</h1></div></div>
<div style="padding:40px 0;background:#f8f9fc;">
  <div class="container"><div class="row justify-content-center"><div class="col-lg-7">
    <div class="card"><div class="card-body p-4">
      <form method="POST">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label fw-bold">Gender</label><select name="gender" class="form-select"><option>Male</option><option>Female</option></select></div>
          <div class="col-md-6"><label class="form-label fw-bold">Date of Birth</label><input type="date" name="dob" class="form-control"></div>
          <div class="col-md-6"><label class="form-label fw-bold">Height</label><input type="text" name="height" class="form-control" placeholder="e.g. 5'6&quot;"></div>
          <div class="col-md-6"><label class="form-label fw-bold">Complexion</label><select name="complexion" class="form-select"><option value="">Select</option><option>Fair</option><option>Wheatish</option><option>Dark</option></select></div>
          <div class="col-md-6"><label class="form-label fw-bold">Education</label><input type="text" name="education" class="form-control" placeholder="Highest qualification"></div>
          <div class="col-md-6"><label class="form-label fw-bold">Profession</label><input type="text" name="profession" class="form-control" placeholder="Job/Business"></div>
          <div class="col-12"><label class="form-label fw-bold">City</label><input type="text" name="city" class="form-control"></div>
          <div class="col-12"><label class="form-label fw-bold">About (optional)</label><textarea name="about" class="form-control" rows="3" placeholder="Kuch apne baare mein likhein..."></textarea></div>
        </div>
        <div style="background:#FFF8E1;border:1px solid #F0C040;border-radius:8px;padding:12px;margin:16px 0;font-size:0.85rem;color:#856404;">
          <i class="bi bi-info-circle me-1"></i>Profile admin approval ke baad visible hogi. Aapka mobile number public nahi hoga.
        </div>
        <div class="form-check mb-3"><input type="checkbox" class="form-check-input" required><label class="form-check-label" style="font-size:0.88rem;">Main consent deta/deti hoon ki yeh information sirf Samaj ke vivah parichay ke liye use hogi.</label></div>
        <button type="submit" class="btn btn-gold w-100">Profile Submit Karein</button>
      </form>
    </div></div>
  </div></div></div>
</div>
{% endblock %}
